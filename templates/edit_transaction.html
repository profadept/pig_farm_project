{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">✏️ Edit Transaction #{{ transaction.id }}</h4>
                <a href="/ledger" class="btn btn-sm btn-light">Cancel</a>
            </div>
            <div class="card-body">
                <form action="/edit-transaction/{{ transaction.id }}" method="post">
                    
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" name="txn_date" value="{{ transaction.txn_date }}" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Transaction Type</label>
                            <select class="form-select" name="txn_type" required>
                                <option value="Expense" {% if transaction.txn_type == 'Expense' %}selected{% endif %}>Expense</option>
                                <option value="Income" {% if transaction.txn_type == 'Income' %}selected{% endif %}>Income</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Category</label>
                            <select class="form-select" name="category" required>
                                <option value="Feed" {% if transaction.category.value == 'Feed' %}selected{% endif %}>Feed</option>
                                <option value="Medicine" {% if transaction.category.value == 'Medicine' %}selected{% endif %}>Medicine</option>
                                <option value="Sales" {% if transaction.category.value == 'Sales' %}selected{% endif %}>Sales</option>
                                <option value="Utilities" {% if transaction.category.value == 'Utilities' %}selected{% endif %}>Utilities</option>
                                <option value="Rent" {% if transaction.category.value == 'Rent' %}selected{% endif %}>Rent</option>
                                <option value="Property" {% if transaction.category.value == 'Property' %}selected{% endif %}>Property</option>
                                <option value="Other" {% if transaction.category.value == 'Other' %}selected{% endif %}>Other</option>
                                <option value="Transport" {% if transaction.category.value == 'Transport' %}selected{% endif %}>Transport</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label">Payment Status</label>
                            <select class="form-select" name="payment_status" required>
                                <option value="Paid" {% if transaction.payment_status.value == 'Paid' %}selected{% endif %}>Paid</option>
                                <option value="Unpaid" {% if transaction.payment_status.value == 'Unpaid' %}selected{% endif %}>Unpaid</option>
                                <option value="Partially Paid" {% if transaction.payment_status.value == 'Partially Paid' %}selected{% endif %}>Partially Paid</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Item Description</label>
                        <input type="text" class="form-control" name="item_description" value="{{ transaction.item_description }}" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Quantity</label>
                            <input type="number" step="0.01" min="0" class="form-control" name="qty" value="{{ transaction.qty }}" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Unit Price (₦)</label>
                            <input type="number" step="0.01" min="0" class="form-control" name="unit_price" value="{{ transaction.unit_price }}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Remarks (Optional)</label>
                        <textarea class="form-control" name="remarks" rows="2">{% if transaction.remarks %}{{ transaction.remarks }}{% endif %}</textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
