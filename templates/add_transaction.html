{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">➕ Record New Transaction</h4>
            </div>
            <div class="card-body">
                <form action="/add-transaction" method="post">
                    
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" name="txn_date" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Transaction Type</label>
                            <select class="form-select" name="txn_type" required>
                                <option value="Expense">Expense</option>
                                <option value="Income">Income</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Category</label>
                            <select class="form-select" name="category" required>
                                <option value="Feed">Feed</option>
                                <option value="Medicine">Medicine</option>
                                <option value="Sales">Sales</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Rent">Rent</option>
                                <option value="Property">Property</option>
                                <option value="Other">Other</option>
                                <option value="Transport">Transport</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label">Payment Status</label>
                            <select class="form-select" name="payment_status" required>
                                <option value="Paid">Paid</option>
                                <option value="Unpaid">Unpaid</option>
                                <option value="Partially Paid">Partially Paid</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Item Description</label>
                        <input type="text" class="form-control" name="item_description" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Quantity</label>
                            <input type="number" step="0.01" class="form-control" name="qty" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Unit Price (₦)</label>
                            <input type="number" step="0.01" class="form-control" name="unit_price" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Remarks (Optional)</label>
                        <textarea class="form-control" name="remarks" rows="2"></textarea>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Save Transaction</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
