{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">➕ Record New Transaction</h4>
            </div>
            <div class="card-body bg-light">
                <form action="/add-transaction" method="post">
                    
                    <h5 class="text-primary border-bottom pb-2">1. Core Details</h5>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Date</label>
                            <input type="date" class="form-control" name="txn_date" id="txn_date" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Type</label>
                            <select class="form-select" name="txn_type" id="txn_type" required>
                                <option value="Expense" selected>Expense</option>
                                <option value="Income">Income</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Category</label>
                            <select class="form-select" name="category" id="category" required>
                                <option value="Livestock Sales" class="income-opt" style="display:none;">Livestock Sales</option>
                                <option value="Crop/Byproduct Sales" class="income-opt" style="display:none;">Crop/Byproduct Sales</option>
                                <option value="Other Income" class="income-opt" style="display:none;">Other Income</option>
                                
                                <option value="Feed" class="expense-opt">Feed</option>
                                <option value="Medicine & Vaccines" class="expense-opt">Medicine & Vaccines</option>
                                <option value="Labor" class="expense-opt">Labor</option>
                                <option value="Assets & Equipment" class="expense-opt">Assets & Equipment</option>
                                <option value="Maintenance" class="expense-opt">Maintenance</option>
                                <option value="Utilities" class="expense-opt">Utilities</option>
                                <option value="Consumables" class="expense-opt">Consumables</option>
                                <option value="Transport & Logistics" class="expense-opt">Transport & Logistics</option>
                                <option value="Other Expense" class="expense-opt">Other Expense</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Item Description</label>
                            <input type="text" class="form-control" name="item_description" placeholder="e.g., Crushed Maize, Pen Rent" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Entity Name (Vendor/Customer)</label>
                            <input type="text" class="form-control" name="entity_name" placeholder="e.g., Oke Aro Feed Mill">
                        </div>
                    </div>

                    <h5 class="text-primary border-bottom pb-2">2. Financial Metrics</h5>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Quantity</label>
                            <input type="number" step="0.01" class="form-control math-input" name="qty" id="qty" value="1" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Unit of Measure</label>
                            <select class="form-select" name="unit_of_measure" required>
                                <option value="kg">kg</option>
                                <option value="Liters">Liters</option>
                                <option value="Head">Head</option>
                                <option value="Month">Month</option>
                                <option value="Day">Day</option>
                                <option value="Job/Item">Job / Item</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Unit Price (₦)</label>
                            <input type="number" step="0.01" class="form-control math-input" name="unit_price" id="unit_price" value="0" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold text-success">Total Amount (₦)</label>
                            <input type="number" class="form-control bg-white text-success fw-bold" id="total_amount_display" readonly>
                            </div>
                    </div>

                    <div class="row mb-4 bg-white p-3 border rounded">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-danger">Amount Paid Today (₦)</label>
                            <input type="number" step="0.01" class="form-control math-input border-danger" name="amount_paid" id="amount_paid" value="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Payment Status</label>
                            <select class="form-select bg-light" name="payment_status" id="payment_status" style="pointer-events: none;" required>
                                <option value="Unpaid">Unpaid</option>
                                <option value="Partially Paid">Partially Paid</option>
                                <option value="Paid">Paid</option>
                            </select>
                            <small class="text-muted">Auto-calculated based on Amount Paid</small>
                        </div>
                    </div>

                    <h5 class="text-primary border-bottom pb-2">3. Database Links & Notes</h5>
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Reference Tag</label>
                            <input type="text" class="form-control" name="reference_tag" placeholder="e.g., SOW-001, Pen_A">
                            <small class="text-muted">Link to specific livestock/inventory</small>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Remarks (Optional)</label>
                            <input type="text" class="form-control" name="remarks" placeholder="Any extra details...">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">💾 Save Transaction</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Set today's date automatically
    document.getElementById('txn_date').valueAsDate = new Date();

    // 2. Smart Category Filter
    const typeSelect = document.getElementById('txn_type');
    const categorySelect = document.getElementById('category');

    typeSelect.addEventListener('change', function() {
        const isIncome = this.value === 'Income';
        
        // Hide/Show options based on Type
        document.querySelectorAll('.income-opt').forEach(opt => opt.style.display = isIncome ? 'block' : 'none');
        document.querySelectorAll('.expense-opt').forEach(opt => opt.style.display = isIncome ? 'none' : 'block');
        
        // Auto-select the first visible option to prevent errors
        categorySelect.value = isIncome ? 'Livestock Sales' : 'Feed';
    });

    // 3. The Math Engine (Calculates Total and Payment Status)
    const qtyInput = document.getElementById('qty');
    const priceInput = document.getElementById('unit_price');
    const totalDisplay = document.getElementById('total_amount_display');
    const paidInput = document.getElementById('amount_paid');
    const statusSelect = document.getElementById('payment_status');

    function calculateMath() {
        // Get values (default to 0 if empty)
        const qty = parseFloat(qtyInput.value) || 0;
        const price = parseFloat(priceInput.value) || 0;
        const paid = parseFloat(paidInput.value) || 0;

        // Calculate Total
        const total = qty * price;
        totalDisplay.value = total.toFixed(2);

        // Determine Status
        if (paid === 0 && total > 0) {
            statusSelect.value = "Unpaid";
        } else if (paid > 0 && paid < total) {
            statusSelect.value = "Partially Paid";
        } else if (paid >= total && total > 0) {
            statusSelect.value = "Paid";
        } else {
            statusSelect.value = "Unpaid"; // Fallback
        }
    }

    // Run the math every time the user types in these three boxes
    qtyInput.addEventListener('input', calculateMath);
    priceInput.addEventListener('input', calculateMath);
    paidInput.addEventListener('input', calculateMath);
</script>
{% endblock %}
